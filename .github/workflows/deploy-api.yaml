name: Subir la API a Docker Hub (receta reutilizable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Nombre de la imagen
        required: true
        type: string
      image-tag:
        description: Tag de la imagen (ej: v1.0.0)
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

  workflow_dispatch:
    inputs:
      image-name:
        required: true
        type: string
      image-tag:
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"

          docker build \
            -t "$IMAGE:${{ inputs.image-tag }}" \
            -t "$IMAGE:latest" \
            .

          docker push --all-tags "$IMAGE"